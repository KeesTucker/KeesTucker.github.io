        <style>
            body { font-family: "JetBrains Mono", monospace; font-weight: 300; }
            .section-hidden {
                opacity: 0;
                transform: translateY(32px);
            }
            .section-visible {
                opacity: 1;
                transform: translateY(0);
                transition: opacity 0.6s ease, transform 0.6s ease;
            }
            .media {
                width: calc(33.333%);
                height: auto;
                object-fit: cover;
                display: block;
            }
            @media (max-width: 600px) {
                .media { width: calc(50%); }
            }
            .nav-btn {
                cursor: pointer;
                background: none;
                border: none;
                padding: 0;
                color: rgb(113 113 122);
                transition: color 0.2s;
            }
            .nav-btn:hover {
                color: rgb(161 161 170);
            }
            .nav-btn.active {
                color: rgb(255 255 255);
            }
        </style>
    </head>
